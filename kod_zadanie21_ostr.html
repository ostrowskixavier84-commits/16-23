<td><b>Pojęcie</b></td>

<tr>
<td>Co znaczy skrót ID?</td>
<td>ID oznacza identyfikator.</td>
</tr>

<tr>
<td>Jaki jest cel stosowania ID?</td>
<td>ID służy do przypisywania stylu jednemu konkretnemu elementowi.</td>
</tr>

<tr>
<td>Jakie jest znaczenie znaku #?</td>
<td>Znak # oznacza identyfikator w CSS.</td>
</tr>

<tr>
<td>Jak następuje wywołanie ID?</td>
<td>
ID wywołujemy poprzez:
id="nazwa"
oraz w CSS:
#nazwa
</td>
</tr>

<tr>
<td>Uwagi na temat stosowania ID</td>
<td>

<ul>

<li>ID powinno być unikalne.</li>

<li>ID można użyć tylko raz na stronie.</li>

<li>Jeśli elementów jest więcej używa się class.</li>

</ul>

</td>
</tr>
